# Production-ready Docker Compose with Nginx reverse proxy and PostgreSQL
# Use: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # Ollama service - AI Models
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-prod
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chatbot-prod-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: chatbot-db
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: secure_password_change_this
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - chatbot-prod-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    volumes:
      - redis_data:/data
    networks:
      - chatbot-prod-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chatbot API Service
  chatbot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-api-prod
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=mistral
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://chatbot:secure_password_change_this@db:5432/chatbot
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatbot-prod-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - chatbot-api
    networks:
      - chatbot-prod-network
    restart: always

networks:
  chatbot-prod-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  db_data:
    driver: local
  redis_data:
    driver: local

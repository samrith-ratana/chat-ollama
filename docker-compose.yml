version: '3.8'

services:
  # Ollama service - Local AI models
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-chatbot
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chatbot-network

  # Chatbot API service
  chatbot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-api
    ports:
      - "5000:5000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - KNOWLEDGE_DB_PATH=/app/data/knowledge.db
    networks:
      - chatbot-network
    volumes:
      - chatbot_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chatbot-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  chatbot_data:
    driver: local
